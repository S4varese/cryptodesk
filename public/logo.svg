<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="96" fill="#080808"/>
  <defs>
    <linearGradient id="hexGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F0C848"/>
      <stop offset="100%" stop-color="#A08020"/>
    </linearGradient>
  </defs>

  <!-- Esagono -->
  <path
    d="M256 60 L440 163 L440 349 L256 452 L72 349 L72 163 Z"
    fill="#D4AF37" fill-opacity="0.1"
    stroke="url(#hexGrad)" stroke-width="14"
  />

  <!-- Candela 1 rialzista -->
  <line x1="160" y1="190" x2="160" y2="340" stroke="#D4AF37" stroke-width="8" stroke-opacity="0.4"/>
  <rect x="135" y="220" width="50" height="80" rx="6" fill="#D4AF37"/>

  <!-- Candela 2 ribassista -->
  <line x1="256" y1="175" x2="256" y2="345" stroke="#666" stroke-width="8" stroke-opacity="0.4"/>
  <rect x="231" y="215" width="50" height="90" rx="6" fill="#444"/>

  <!-- Candela 3 rialzista grande -->
  <line x1="352" y1="160" x2="352" y2="335" stroke="#F0C848" stroke-width="8" stroke-opacity="0.4"/>
  <rect x="327" y="185" width="50" height="110" rx="6" fill="url(#hexGrad)"/>

  <!-- Linea trend -->
  <polyline
    points="160,248 256,265 352,218"
    stroke="#F0C848" stroke-width="12" stroke-opacity="0.7"
    fill="none" stroke-dasharray="18 10" stroke-linecap="round"
  />
</svg>
